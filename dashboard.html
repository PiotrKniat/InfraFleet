<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InfraFleet - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">InfraFleet Dashboard</span>
            <a href="login.html" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </nav>
    <div class="container">
        
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Server Inventory</h4>
            <!-- Przycisk otwierający formularz dodawania -->
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addServerModal">
                + Add New Server
            </button>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th><th>Name</th><th>IP Address</th><th>OS</th><th>Status</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="serverTableBody">
                        <tr>
                            <td>1</td><td>web-prod-01</td><td>192.168.1.10</td><td>Ubuntu 22.04</td>
                            <td><span class="badge bg-success">Online</span></td>
                            <td>
                                <button class="btn btn-sm btn-primary run-task-btn" data-name="web-prod-01">Run Task</button>
                                <button class="btn btn-sm btn-danger delete-server-btn">Delete</button>
                            </td>
                        </tr>
                        <tr>
                            <td>2</td><td>db-prod-01</td><td>192.168.1.20</td><td>Debian 11</td>
                            <td><span class="badge bg-success">Online</span></td>
                            <td>
                                <button class="btn btn-sm btn-primary run-task-btn" data-name="db-prod-01">Run Task</button>
                                <button class="btn btn-sm btn-danger delete-server-btn">Delete</button>
                            </td>
                        </tr>
                        <tr>
                            <td>3</td><td>test-env-01</td><td>192.168.1.50</td><td>Windows Server 2022</td>
                            <td><span class="badge bg-danger">Offline</span></td>
                            <td>
                                <button class="btn btn-sm btn-secondary" disabled>Run Task</button>
                                <button class="btn btn-sm btn-danger delete-server-btn">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <h4>Task Execution Console</h4>
        <div class="card shadow-sm bg-dark text-white">
            <div class="card-body">
                <pre id="console-output" style="margin: 0; min-height: 100px;">Waiting for tasks...</pre>
            </div>
        </div>
    </div>

    <!-- Modal (Pop-up z formularzem dodawania serwera) -->
    <div class="modal fade" id="addServerModal" tabindex="-1" aria-labelledby="addServerModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addServerModalLabel">Add New Server</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addServerForm">
                        <div class="mb-3">
                            <label>Server Name</label>
                            <input type="text" id="serverName" class="form-control" required placeholder="e.g. web-prod-02">
                        </div>
                        <div class="mb-3">
                            <label>IP Address</label>
                            <input type="text" id="serverIp" class="form-control" required placeholder="e.g. 192.168.1.30">
                            <div id="ipError" class="text-danger mt-1" style="display:none; font-size: 0.9em;"></div>
                        </div>
                        <div class="mb-3">
                            <label>Operating System</label>
                            <select id="serverOs" class="form-select">
                                <option>Ubuntu 22.04</option>
                                <option>Debian 11</option>
                                <option>Windows Server 2022</option>
                                <option>CentOS 8</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Server</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Wymagane skrypty Bootstrapa do działania Modala -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Logika uruchamiania zadań w konsoli
        function attachRunTaskEvent(button) {
            button.addEventListener('click', function() {
                const serverName = this.getAttribute('data-name');
                const consoleOutput = document.getElementById('console-output');
                
                consoleOutput.innerHTML = `> Initiating task on ${serverName}...\n`;
                consoleOutput.innerHTML += `[INFO] Establishing SSH connection...\n`;
                
                setTimeout(() => {
                    consoleOutput.innerHTML += `[INFO] Executing task: Restart Nginx / Update Packages\n`;
                    consoleOutput.innerHTML += `[SUCCESS] Task completed with exit code 0.\n`;
                }, 1000);
            });
        }

        // Logika usuwania serwera
        function attachDeleteEvent(button) {
            button.addEventListener('click', function() {
                // Znajduje najbliższy wiersz dla klikniętego przycisku i go usuwa
                const row = this.closest('tr');
                const serverName = row.cells[1].innerText;
                
                if (confirm(`Are you sure you want to delete ${serverName} from inventory?`)) {
                    row.remove();
                }
            });
        }

        // Podpinamy zdarzenia do początkowych przycisków w tabeli
        document.querySelectorAll('.run-task-btn').forEach(button => attachRunTaskEvent(button));
        document.querySelectorAll('.delete-server-btn').forEach(button => attachDeleteEvent(button));

        // Logika dodawania nowego serwera
        let nextId = 4; // Startujemy od ID 4, bo 1-3 są wpisane na sztywno
        
        document.getElementById('addServerForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Zatrzymuje przeładowanie strony
            
            const name = document.getElementById('serverName').value;
            const ip = document.getElementById('serverIp').value;
            const os = document.getElementById('serverOs').value;
            const errorDiv = document.getElementById('ipError');
            
            // Prosty Regex sprawdzający poprawność formatu IPv4
            const ipRegex = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            
            if (!ipRegex.test(ip)) {
                errorDiv.innerText = "Invalid IP address format!";
                errorDiv.style.display = "block";
                return;
            }

            // Sprawdzanie czy IP już istnieje w tabeli
            const rows = document.querySelectorAll('#serverTableBody tr');
            for (let row of rows) {
                if (row.cells[2].innerText === ip) {
                    errorDiv.innerText = "This IP address already exists in the database!";
                    errorDiv.style.display = "block";
                    return;
                }
            }

            // Jeśli walidacja przejdzie, chowamy błędy
            errorDiv.style.display = "none";

            // Dodajemy nowy wiersz do tabeli
            const tableBody = document.getElementById('serverTableBody');
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td>${nextId++}</td>
                <td>${name}</td>
                <td>${ip}</td>
                <td>${os}</td>
                <td><span class="badge bg-success">Online</span></td>
                <td>
                    <button class="btn btn-sm btn-primary run-task-btn" data-name="${name}">Run Task</button>
                    <button class="btn btn-sm btn-danger delete-server-btn">Delete</button>
                </td>
            `;
            tableBody.appendChild(newRow);

            // Podpinamy konsolę i usuwanie pod nowy przycisk
            attachRunTaskEvent(newRow.querySelector('.run-task-btn'));
            attachDeleteEvent(newRow.querySelector('.delete-server-btn'));

            // Zamykamy modal i resetujemy formularz
            const modalInstance = bootstrap.Modal.getInstance(document.getElementById('addServerModal'));
            modalInstance.hide();
            e.target.reset();
        });
    </script>
</body>
</html>
