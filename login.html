<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InfraFleet - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; height: 100vh; }
        .login-card { max-width: 400px; margin: auto; padding: 30px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background: white; border-radius: 8px;}
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h3 class="text-center mb-4">InfraFleet</h3>
            <!-- Formularz w czystym HTML, który po prostu przekierowuje do dashboardu -->
            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="mb-3">
                    <label>Username</label>
                    <input type="text" class="form-control" required value="admin">
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" class="form-control" required value="admin">
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
